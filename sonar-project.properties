sonar.projectKey=itanis-official_ModuleCRM
sonar.organization=itanis-official

# Nom et version affichés sur SonarCloud
sonar.projectName=Module CRM
sonar.projectVersion=1.0

# Dossiers à analyser
sonar.sources=.

# Exclusions — fichiers générés ou non pertinents pour l'analyse
sonar.exclusions=**/bin/**,**/obj/**,**/Migrations/**,**/Properties/**,**/*.Designer.cs,**/wwwroot/lib/**

# Encoding du code source
sonar.sourceEncoding=UTF-8

# Indique le langage principal (optionnel mais utile)
sonar.language=cs
